<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bi'S MART - Điểm Danh Đào Tạo</title>
    <!-- Font Roboto cho nội dung -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Thư viện đọc CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            /* Màu thương hiệu */
            --color-orange: #F36A22;
            --color-orange-dark: #D45A1A;
            --color-mint: #5EBE9E;
            --color-mint-dark: #4A9E82;
            
            /* Màu nền tươi sáng */
            --color-bg: #F4F7F6;
            --color-card: #FFFFFF;
            --color-text-main: #333333;
            --color-text-muted: #777777;
            --color-border: #E5E7EB;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(-45deg, #F4F7F6, #e8f5f1, #fdece3, #ffffff);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            color: var(--color-text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Tắt highlight mặc định trên Mobile */
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Nền chuyển động phụ trợ */
        .bg-shape {
            position: fixed;
            border-radius: 50%;
            z-index: -1;
            filter: blur(70px);
            opacity: 0.45;
            animation: floatShape 12s ease-in-out infinite alternate;
        }
        .shape-1 {
            width: 300px; height: 300px;
            background: var(--color-mint);
            top: -100px; left: -100px;
        }
        .shape-2 {
            width: 320px; height: 320px;
            background: var(--color-orange);
            bottom: -100px; right: -100px;
            animation-delay: -5s;
        }
        .shape-3 {
            width: 250px; height: 250px;
            background: #FFE0B2;
            top: 40%; left: -80px;
            animation-duration: 15s;
            animation-delay: -2s;
        }
        .shape-4 {
            width: 280px; height: 280px;
            background: #B2DFDB;
            bottom: 20%; right: -50px;
            animation-duration: 18s;
            animation-delay: -7s;
        }

        @keyframes floatShape {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { transform: translate(45px, 45px) scale(1.15) rotate(15deg); }
        }

        .app-container {
            background-color: var(--color-card);
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); /* Bóng đổ mềm mại cho nền trắng */
            text-align: center;
            border-top: 6px solid var(--color-orange);
            border-bottom: 6px solid var(--color-mint);
        }

        .logo {
            width: 140px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        h2 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 30px;
            color: var(--color-text-main);
            font-size: 20px;
        }
        
        h2 span {
            color: var(--color-orange);
        }

        .welcome-text {
            font-size: 14.5px;
            line-height: 1.5;
            color: var(--color-text-muted);
            margin-bottom: 25px;
            padding: 0 5px;
            font-weight: 500;
        }

        .form-group {
            text-align: left;
            margin-bottom: 22px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--color-text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 16px;
            border: 2px solid var(--color-border);
            background: #F9FAFB;
            color: var(--color-text-main);
            border-radius: 14px;
            font-size: 16px; /* 16px chuẩn để iOS không auto-zoom */
            font-weight: 500;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]::placeholder {
            color: #A0AEC0;
            font-weight: 400;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--color-mint);
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(94, 190, 158, 0.15); 
        }

        /* --- Hiệu ứng khi gõ phím trên điện thoại --- */
        @keyframes typingPulse {
            0% { box-shadow: 0 0 0 2px rgba(94, 190, 158, 0.2); }
            50% { box-shadow: 0 0 0 8px rgba(94, 190, 158, 0.4); }
            100% { box-shadow: 0 0 0 2px rgba(94, 190, 158, 0.2); }
        }
        .is-typing {
            animation: typingPulse 0.8s infinite;
            border-color: var(--color-mint) !important;
            background: #FFFFFF !important;
        }

        input[type="text"]:read-only {
            background-color: #F3F4F6;
            color: var(--color-text-muted);
            border-color: var(--color-border);
            cursor: not-allowed;
        }

        /* CSS cho thanh xổ xuống (Dropdown) */
        .autocomplete-container {
            position: relative;
        }

        .suggestion-list {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #FFFFFF;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            margin-top: 6px;
            padding: 0;
            list-style: none;
            max-height: 240px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .suggestion-list li {
            padding: 15px 18px;
            font-size: 16px;
            color: var(--color-text-main);
            border-bottom: 1px solid #F3F4F6;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .suggestion-list li:last-child {
            border-bottom: none;
        }

        .suggestion-list li:active, .suggestion-list li:hover {
            background-color: #f0fdf6;
            color: var(--color-mint-dark);
            font-weight: 500;
            padding-left: 22px; 
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 35px;
        }

        /* Nút phong cách Solid 3D tươi sáng */
        .btn-3d {
            flex: 1;
            padding: 16px 0;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            color: white;
            transition: all 0.1s;
            position: relative;
            top: 0;
            overflow: hidden; /* Bắt buộc để Ripple không tràn ra ngoài */
        }

        .btn-in {
            background-color: var(--color-mint);
            box-shadow: 0 6px 0 var(--color-mint-dark), 0 10px 10px rgba(94, 190, 158, 0.2);
        }

        .btn-out {
            background-color: var(--color-orange);
            box-shadow: 0 6px 0 var(--color-orange-dark), 0 10px 10px rgba(243, 106, 34, 0.2);
        }

        .btn-3d:active {
            top: 4px;
        }
        
        .btn-in:active {
            box-shadow: 0 2px 0 var(--color-mint-dark), 0 4px 6px rgba(94, 190, 158, 0.2);
        }

        .btn-out:active {
            box-shadow: 0 2px 0 var(--color-orange-dark), 0 4px 6px rgba(243, 106, 34, 0.2);
        }

        /* --- Hiệu ứng Ripple (Sóng toả ra khi chạm) --- */
        span.ripple-effect {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: rippleAnim 600ms linear;
            background-color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }
        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .loader {
            display: none;
            color: var(--color-orange);
            margin-top: 15px;
            font-weight: 700;
            font-size: 14px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* =========================================
           CSS POPUP & HIỆU ỨNG LOANG MÀU HÀNG ĐẦU 
           ========================================= */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }
        .popup-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        /* Hiệu ứng quầng sáng loang màu phía sau Popup */
        .popup-overlay::before {
            content: '';
            position: absolute;
            width: 350px; height: 350px;
            background: radial-gradient(circle, var(--color-mint) 0%, var(--color-orange) 50%, rgba(255,255,255,0) 100%);
            filter: blur(60px);
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 1001;
            pointer-events: none;
        }
        .popup-overlay.show::before {
            opacity: 0.45;
            animation: pulseGlow 3s infinite alternate ease-in-out;
        }
        @keyframes pulseGlow {
            0% { transform: scale(0.9) rotate(0deg); }
            100% { transform: scale(1.2) rotate(45deg); }
        }

        .popup-content {
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 28px;
            text-align: center;
            width: 85%;
            max-width: 360px;
            transform: scale(0.8) translateY(30px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1002;
        }
        .popup-overlay.show .popup-content {
            transform: scale(1) translateY(0);
        }
        .popup-icon {
            font-size: 55px;
            margin-bottom: 10px;
            animation: popupBounce 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popupBounce {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .popup-content h3 {
            /* Chữ gradient hiện đại */
            background: linear-gradient(45deg, var(--color-orange), var(--color-mint-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            font-size: 24px;
            margin: 10px 0 15px;
            text-transform: uppercase;
        }
        
        /* Hiệu ứng nổi bật tên người dùng trong popup */
        .popup-name {
            color: var(--color-orange);
            font-size: 115%;
            font-weight: 900;
        }

        .popup-content p {
            color: var(--color-text-main);
            margin-bottom: 25px;
            font-size: 16px;
            font-weight: 500;
            line-height: 1.5;
        }
        .btn-close-popup {
            background: linear-gradient(45deg, var(--color-mint), #3a8a70);
            border: none;
            color: white;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 16px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 15px rgba(94, 190, 158, 0.4);
        }
        .btn-close-popup:active {
            transform: scale(0.95);
        }
        
        /* CSS cho nút đóng của Popup cảnh báo */
        .btn-warning-popup {
            background: linear-gradient(45deg, var(--color-orange), var(--color-orange-dark));
            box-shadow: 0 6px 15px rgba(243, 106, 34, 0.4);
        }
        
        /* Canvas Pháo hoa */
        #fireworksCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Tránh chặn click chuột */
            z-index: 1005;
        }
    </style>
</head>
<body>

<!-- Các khối nền chuyển động -->
<div class="bg-shape shape-1"></div>
<div class="bg-shape shape-2"></div>
<div class="bg-shape shape-3"></div>
<div class="bg-shape shape-4"></div>

<div class="app-container">
    <img src="https://bismart.vn/wp-content/uploads/2025/12/logo-bi-1400x744.png" alt="Bi'S MART Logo" class="logo" onerror="this.style.display='none'">
    <h2>ĐIỂM DANH <span>ĐÀO TẠO</span></h2>

    <p class="welcome-text">Chào mừng Bạn đến với Chương trình đào tạo dành cho Cửa Hàng Trưởng! Hãy hoàn thành điểm danh và bắt đầu học với tràn đầy năng lượng nhé! 🚀</p>

    <form id="attendanceForm">
        <div class="form-group autocomplete-container">
            <label>Họ và tên học viên</label>
            <input type="text" id="searchInput" placeholder="Nhập hoặc chọn tên..." required autocomplete="off">
            <ul id="suggestionList" class="suggestion-list"></ul>
        </div>

        <div class="form-group">
            <label>Cửa hàng / Khu vực</label>
            <input type="text" id="storeInput" placeholder="Sẽ tự động điền..." readonly required>
        </div>

        <div class="loader" id="loader">⏳ Đang gửi dữ liệu...</div>

        <div class="action-buttons">
            <button type="button" class="btn-3d btn-in" onclick="submitData('Vào', event)">VÀO</button>
            <button type="button" class="btn-3d btn-out" onclick="submitData('Ra', event)">RA</button>
        </div>
    </form>
</div>

<!-- =========================================
     MODAL POPUP THÀNH CÔNG & PHÁO HOA 
     ========================================= -->
<div id="successPopup" class="popup-overlay">
    <canvas id="fireworksCanvas"></canvas>
    <div class="popup-content">
        <div class="popup-icon">🎉</div>
        <h3>Tuyệt Vời!</h3>
        <p id="popupMessage">Bạn đã ghi nhận [Vào] thành công.</p>
        <button onclick="closePopup()" class="btn-close-popup">ĐÓNG</button>
    </div>
</div>

<!-- =========================================
     MODAL POPUP CẢNH BÁO/LỖI (THAY THẾ ALERT) 
     ========================================= -->
<div id="messagePopup" class="popup-overlay">
    <div class="popup-content">
        <div class="popup-icon" id="messageIcon">⚠️</div>
        <h3 id="messageTitle">THÔNG BÁO</h3>
        <p id="messageText">Nội dung thông báo.</p>
        <button onclick="closeMessagePopup()" class="btn-close-popup btn-warning-popup">ĐÃ HIỂU</button>
    </div>
</div>

<script>
    // --- CẤU HÌNH HỆ THỐNG ---
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzbBXhYyQUBNQY4KZI0hwIY7sqVo0UNbC97mPQAPzv7m-pg8IbSoC1dfLMgoH889-m5/exec";
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQVDw7mfs54dxWOVJNB3UPxDzMgOqqDfpVfYks4C593qhQkIPIEoWrzZX6e0Xj4HewRdcroBgHC4elA/pub?gid=1052302387&single=true&output=csv";
    
    let globalStudents = [];

    // 1. Tải danh sách từ CSV ngay khi mở Web (Quét thủ công bỏ qua dòng gộp)
    Papa.parse(CSV_URL, {
        download: true,
        header: false,
        complete: function(results) {
            const rows = results.data;
            let headerRowIndex = -1;
            let nameIndex = -1;
            let storeIndex = -1;

            // Tìm tự động dòng chứa "Họ và Tên" và "Cửa Hàng"
            for(let i = 0; i < Math.min(10, rows.length); i++) {
                for(let j = 0; j < rows[i].length; j++) {
                    if(typeof rows[i][j] === 'string' && rows[i][j].trim() === "Họ và Tên") {
                        headerRowIndex = i;
                        nameIndex = j;
                    }
                    if(typeof rows[i][j] === 'string' && rows[i][j].trim() === "Cửa Hàng") {
                        storeIndex = j;
                    }
                }
                if(headerRowIndex !== -1) break; 
            }

            if(nameIndex !== -1 && storeIndex !== -1) {
                for(let i = headerRowIndex + 1; i < rows.length; i++) {
                    const name = rows[i][nameIndex];
                    const store = rows[i][storeIndex];
                    
                    if(name && name.trim() !== "") {
                        globalStudents.push({
                            name: name.trim(),
                            store: store ? store.trim() : ""
                        });
                    }
                }
            }
        }
    });

    // 2. Xử lý thanh xổ xuống (Dropdown) tùy chỉnh tối ưu cho Mobile
    const searchInput = document.getElementById('searchInput');
    const suggestionList = document.getElementById('suggestionList');
    const storeInput = document.getElementById('storeInput');

    function renderSuggestions(filterText = "") {
        suggestionList.innerHTML = "";
        const trimmedText = filterText.trim();
        const lowerFilter = trimmedText.toLowerCase();
        
        // Chỉ hiển thị gợi ý khi nhập ít nhất 4 ký tự (Không phân biệt hoa thường)
        if (trimmedText.length < 4) {
            suggestionList.style.display = 'none';
            return;
        }
        
        const filtered = globalStudents.filter(s => s.name.toLowerCase().includes(lowerFilter));
        
        if (filtered.length === 0) {
            suggestionList.style.display = 'none';
            return;
        }

        filtered.forEach(student => {
            const li = document.createElement('li');
            li.textContent = student.name;
            li.addEventListener('click', () => {
                searchInput.value = student.name;
                storeInput.value = student.store;
                suggestionList.style.display = 'none';
                searchInput.classList.remove('is-typing'); // Bỏ hiệu ứng gõ khi đã chọn
            });
            suggestionList.appendChild(li);
        });
        suggestionList.style.display = 'block';
    }

    // --- Thêm hiệu ứng phát sáng khi gõ phím ---
    let typingTimer;
    searchInput.addEventListener('input', (e) => {
        // Thêm class phát sáng nhịp tim
        searchInput.classList.add('is-typing');
        clearTimeout(typingTimer);
        // Tự động tắt sau 600ms ngừng gõ
        typingTimer = setTimeout(() => {
            searchInput.classList.remove('is-typing');
        }, 600);

        renderSuggestions(e.target.value);
        const student = globalStudents.find(s => s.name === e.target.value.trim());
        if (!student) {
            storeInput.value = "";
        }
    });

    searchInput.addEventListener('focus', () => {
        renderSuggestions(searchInput.value);
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.autocomplete-container')) {
            suggestionList.style.display = 'none';
        }
    });

    // =========================================
    // HỆ THỐNG PHÁO HOA BẰNG CANVAS (JS)
    // =========================================
    const canvas = document.getElementById('fireworksCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animationFrameId;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.velocity = {
                x: (Math.random() - 0.5) * 12, // Độ lan toả
                y: (Math.random() - 0.5) * 12
            };
            this.alpha = 1;
            this.friction = 0.96; // Sức cản không khí
            this.gravity = 0.15; // Lực hút trái đất
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 4, 0, Math.PI * 2, false);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.restore();
        }
        update() {
            this.draw();
            this.velocity.x *= this.friction;
            this.velocity.y *= this.friction;
            this.velocity.y += this.gravity;
            this.x += this.velocity.x;
            this.y += this.velocity.y;
            this.alpha -= 0.015; // Tốc độ mờ dần
        }
    }

    function spawnFireworks(x, y) {
        const colors = ['#F36A22', '#5EBE9E', '#FFD700', '#FF69B4', '#00FFFF', '#FFFFFF'];
        for (let i = 0; i < 80; i++) {
            particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
        }
    }

    function animateFireworks() {
        animationFrameId = requestAnimationFrame(animateFireworks);
        // Nền hơi mờ đen để tạo hiệu ứng đuôi pháo hoa rớt xuống đẹp mắt
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        particles.forEach((particle, index) => {
            if (particle.alpha > 0) {
                particle.update();
            } else {
                particles.splice(index, 1);
            }
        });
    }

    // =========================================
    // QUẢN LÝ POPUP
    // =========================================
    function showSuccessPopup(type, name) {
        const popup = document.getElementById('successPopup');
        document.getElementById('popupMessage').innerHTML = `Chúc Mừng <span class="popup-name">${name}</span> đã hoàn thành điểm danh <b>[${type}]</b>.<br><br>Hãy vào lớp và học thật năng lượng nhé! 🚀`;
        popup.classList.add('show');
        
        resizeCanvas();
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
        
        // Bắn pháo hoa ngẫu nhiên nhiều nhịp
        for(let i=0; i<6; i++) {
            setTimeout(() => {
                spawnFireworks(
                    Math.random() * canvas.width,
                    Math.random() * (canvas.height * 0.6) // Chỉ nổ ở nửa trên màn hình
                );
            }, i * 400);
        }
        
        if(!animationFrameId) {
            animateFireworks();
        }
    }

    function closePopup() {
        document.getElementById('successPopup').classList.remove('show');
        // Dừng pháo hoa để tiết kiệm tài nguyên máy
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
        particles = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Quay lại giao diện đầu tiên (xoá trắng form)
        document.getElementById('attendanceForm').reset();
    }

    // =========================================
    // QUẢN LÝ POPUP CẢNH BÁO
    // =========================================
    function showMessagePopup(icon, title, message) {
        document.getElementById('messageIcon').innerText = icon;
        document.getElementById('messageTitle').innerText = title;
        document.getElementById('messageText').innerHTML = message;
        document.getElementById('messagePopup').classList.add('show');
    }

    function closeMessagePopup() {
        document.getElementById('messagePopup').classList.remove('show');
    }

    // 3. Xử lý Gửi điểm danh & Hiệu ứng Ripple Click
    function submitData(type, event) {
        // --- Chạy hiệu ứng Ripple Sóng nước khi nhấn ---
        if (event) {
            const button = event.currentTarget;
            const circle = document.createElement("span");
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;

            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - button.getBoundingClientRect().left - radius}px`;
            circle.style.top = `${event.clientY - button.getBoundingClientRect().top - radius}px`;
            circle.classList.add("ripple-effect");

            // Xoá sóng cũ nếu bấm liên tiếp
            const existingRipple = button.querySelector('.ripple-effect');
            if (existingRipple) {
                existingRipple.remove();
            }
            button.appendChild(circle);
        }

        const hoTen = document.getElementById('searchInput').value.trim();
        const cuaHang = document.getElementById('storeInput').value.trim();
        const loader = document.getElementById('loader');

        if(!hoTen || !cuaHang) {
            // Chờ 1 chút xíu để thấy hiệu ứng nút rồi mới cảnh báo bằng popup trong web
            setTimeout(() => showMessagePopup("⚠️", "THIẾU THÔNG TIN", "Vui lòng chọn hoặc nhập đúng họ tên học viên từ danh sách!"), 100);
            return;
        }

        loader.style.display = 'block';

        // Đóng gói dữ liệu vào URL để gửi phương thức GET
        const urlWithParams = `${APPS_SCRIPT_URL}?hoTen=${encodeURIComponent(hoTen)}&cuaHang=${encodeURIComponent(cuaHang)}&loaiDiemDanh=${encodeURIComponent(type)}`;

        fetch(urlWithParams, {
            method: 'GET',
        }).then(response => response.json())
        .then(data => {
            if(data.status === 'success') {
                // ĐÃ ĐỔI: Gọi Popup Pháo Hoa truyền kèm Tên học viên
                showSuccessPopup(type, hoTen);
            } else {
                showMessagePopup("❌", "LỖI LƯU DỮ LIỆU", `Không thể lưu: ${data.message}`);
            }
            loader.style.display = 'none';
        }).catch(error => {
            showMessagePopup("🌐", "LỖI KẾT NỐI", "Lỗi kết nối máy chủ, vui lòng kiểm tra lại mạng.");
            loader.style.display = 'none';
        });
    }
</script>
